<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Flappy Win</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

/* GAME */
#game {
  width: 100vw;
  height: 100vh;
  background: linear-gradient(#70c5ce, #cceeff);
  position: relative;
  touch-action: manipulation;
}

/* Bird */
#bird {
  position: absolute;
  left: 120px;
  top: 250px;
  width: 42px;
  height: 32px;
  background: url('bird-icon.png') no-repeat center;
  background-size: contain;
}

/* Pipes */
.pipe {
  position: absolute;
  width: 70px;
  background: #2ecc71;
}
.top { top: 0; }
.bottom { bottom: 0; }

/* UI */
#score, #ready {
  position: absolute;
  width: 100%;
  text-align: center;
  color: white;
  text-shadow: 2px 2px 4px #000;
}

#score { top: 20px; font-size: 28px; }
#ready { top: 45%; font-size: 26px; }

#retry {
  display: none;
  position: absolute;
  top: 50%;
  width: 100%;
  text-align: center;
}

#retry button {
  font-size: 20px;
  padding: 12px 26px;
}

/* SCAM SCREEN */
#scam, #blocked {
  display: none;
  width: 100vw;
  height: 100vh;
  background: #111;
  color: red;
  text-align: center;
  padding: 120px 20px;
}
</style>
</head>

<body>

<div id="game">
  <div id="score">Score: 0</div>
  <div id="ready">Tap or Press SPACE to Fly</div>
  <div id="bird"></div>

  <div id="retry">
    <button onclick="retryRound()">Retry</button>
  </div>
</div>

<div id="scam">
  <h1>⚠️ YOU GOT SCAMMED!</h1>
  <p>This game looked real.</p>
  <p>Scams also look real.</p>
  <p><b>Stop. Think. Verify.</b></p>
  <p>Never trust unknown links, offers, or numbers.</p>
</div>

<div id="blocked">
  <h1>🚫 ACCESS DENIED</h1>
  <p>You have already completed this awareness experience.</p>
  <p>The lesson stays. Stay safe online.</p>
</div>

<script>
/* 🔐 ONE-TIME CHECK */
if (localStorage.getItem("hasPlayed") === "true") {
  document.getElementById("game").style.display = "none";
  document.getElementById("blocked").style.display = "block";
}

/* VARIABLES */
const bird = document.getElementById("bird");
const game = document.getElementById("game");
const retryBox = document.getElementById("retry");

let birdY = 250;
let velocity = 0;
const gravity = 0.6;

let running = false;
let roundOver = false;
let lossCount = 0;

let score = 0;
let pipes = [];
let gameLoop, pipeLoop;

/* START GAME */
function startGame() {
  roundOver = false;
  running = true;
  document.getElementById("ready").style.display = "none";
  retryBox.style.display = "none";

  gameLoop = setInterval(loop, 20);
  pipeLoop = setInterval(createPipe, 2600);
}

/* FLAP */
function flap() {
  if (!running && !roundOver) startGame();
  if (!running) return;
  velocity = -7;
}

document.addEventListener("keydown", e => {
  if (e.code === "Space" || e.code === "ArrowUp") flap();
});

game.addEventListener("touchstart", e => {
  if (retryBox.style.display === "block") return;
  e.preventDefault();
  flap();
}, { passive: false });

/* LOOP */
function loop() {
  if (!running) return;

  velocity += gravity;
  birdY += velocity;
  bird.style.top = birdY + "px";

  const birdR = bird.getBoundingClientRect();
  const gameR = game.getBoundingClientRect();

  if (birdR.top <= gameR.top || birdR.bottom >= gameR.bottom) {
    endRound();
    return;
  }

  pipes.forEach(p => {
    p.x -= 3;
    p.top.style.left = p.x + "px";
    p.bottom.style.left = p.x + "px";

    if (hit(birdR, p.top.getBoundingClientRect()) ||
        hit(birdR, p.bottom.getBoundingClientRect())) {
      endRound();
    }

    if (!p.passed && p.x + 70 < birdR.left) {
      p.passed = true;
      score++;
      document.getElementById("score").innerText = `Score: ${score}`;
    }
  });
}

/* COLLISION */
function hit(a, b) {
  return !(a.right < b.left || a.left > b.right || a.bottom < b.top || a.top > b.bottom);
}

/* CREATE PIPE */
function createPipe() {
  const gap = 180;
  const h = game.clientHeight;
  const topH = Math.random() * 200 + 80;
  const botH = h - topH - gap;

  const top = document.createElement("div");
  const bottom = document.createElement("div");

  top.className = "pipe top";
  bottom.className = "pipe bottom";
  top.style.height = topH + "px";
  bottom.style.height = botH + "px";

  game.appendChild(top);
  game.appendChild(bottom);

  pipes.push({ top, bottom, x: game.clientWidth, passed: false });
}

/* END ROUND */
function endRound() {
  if (roundOver) return;
  roundOver = true;
  running = false;

  clearInterval(gameLoop);
  clearInterval(pipeLoop);

  lossCount++;
  score = 0;
  document.getElementById("score").innerText = "Score: 0";

  if (lossCount === 1) {
    retryBox.style.display = "block";
  } else {
    /* 🔒 LOCK FOREVER */
    localStorage.setItem("hasPlayed", "true");
    game.style.display = "none";
    document.getElementById("scam").style.display = "block";
  }
}

/* RETRY */
function retryRound() {
  pipes.forEach(p => {
    p.top.remove();
    p.bottom.remove();
  });
  pipes = [];

  birdY = 250;
  velocity = 0;
  bird.style.top = birdY + "px";

  startGame();
}
</script>

</body>
</html>
